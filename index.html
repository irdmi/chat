<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Chat</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <button id="menu-btn" class="icon-btn">☰</button>
      <h1 id="display-name">Chat</h1>
      <button id="reload-btn" class="icon-btn small-btn">↻</button>
    </header>

    <div id="login-screen">
      <h2>Join Chat</h2>
      <input type="text" id="userName" placeholder="Your name">
      <input type="password" id="seedPhrase" placeholder="Encryption seed (key)">
      <button onclick="enterChat()">Join Chat</button>
      <button onclick="createNewChat()" class="secondary-btn">+ New Chat</button>
    </div>

    <div id="chat-screen" style="display: none;">
      <div id="messages"></div>
      <div class="input-area">
        <input type="text" id="msgInput" placeholder="Message...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Chats</h3>
        <button id="close-sidebar" class="close-btn">✕</button>
      </div>
      <ul id="chat-list"></ul>
      <button onclick="createNewChat()" class="secondary-btn full-width">+ New Chat</button>
    </div>

    <div id="overlay" class="overlay"></div>
  </div>

  <!-- Script в конце body БЕЗ defer -->
  <script src="app.js"></script>
</body>
</html>
