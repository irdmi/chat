<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Chat</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <button id="menu-btn" class="icon-btn">☰</button>
      <h1 id="display-name">Chat</h1>
      <div class="header-buttons">
        <button id="pwd-btn" class="icon-btn small-btn" title="Generate Password">🔑</button>
        <button id="reload-btn" class="icon-btn small-btn" title="Reload">↻</button>
      </div>
    </header>

    <!-- Login Screen -->
    <div id="login-screen">
      <h2>Join Chat</h2>
      <input type="text" id="userName" placeholder="Your name">
      <input type="password" id="seedPhrase" placeholder="Encryption seed (key)">
      <button onclick="enterChat()">Go chatting</button>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" style="display: none;">
      <div id="messages"></div>
      <div class="input-area">
        <input type="text" id="msgInput" placeholder="Message...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Chats</h3>
        <button id="close-sidebar" class="close-btn">✕</button>
      </div>
      <ul id="chat-list"></ul>
      <button onclick="createNewChat()" class="secondary-btn">+ New Chat</button>
    </div>

    <!-- Password Generator Modal -->
    <div id="pwd-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>🔑 Generate Password</h3>
          <button onclick="closePwdModal()" class="close-btn">✕</button>
        </div>
        <div class="pwd-controls">
          <label>Length: <span id="pwd-len-val">256</span></label>
          <input type="range" id="pwd-len" min="16" max="512" value="256" step="16">
          
          <fieldset class="pwd-sets">
            <legend>Character sets</legend>
            <label><input type="checkbox" id="pwd-az" checked> a–z</label>
            <label><input type="checkbox" id="pwd-AZ" checked> A–Z</label>
            <label><input type="checkbox" id="pwd-09" checked> 0–9</label>
            <label><input type="checkbox" id="pwd-sym"> Symbols</label>
          </fieldset>
          
          <div class="pwd-output">
            <code id="pwd-result">—</code>
            <button onclick="copyPassword()" class="icon-btn">📋</button>
          </div>
          
          <div class="pwd-actions">
            <button onclick="generatePassword()" class="primary-btn">🔄 Generate</button>
            <button onclick="copyConfigLink()" class="secondary-btn">🔗 Copy Link</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
